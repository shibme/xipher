<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xipher KMS · Choose Identity</title>
<style>
:root {
  --brand-1: #00ddff;
  --brand-2: #0044ff;
  --brand-gradient: linear-gradient(135deg, #00ddff, #0044ff);
  --bg-color: #eef2f7;
  --bg-accent: radial-gradient(1200px 600px at 50% -10%, rgba(0,132,255,0.10), transparent 60%);
  --surface-color: #ffffff;
  --surface-2: #f5f8fc;
  --text-color: #1c2430;
  --text-muted: #5a6677;
  --text-faint: #8a96a8;
  --border-color: #d7dee8;
  --border-strong: #c2ccd9;
  --error-color: #e5484d;
  --action-disabled-bg: #e2e8f0;
  --action-disabled-text: #8a96a8;
  --shadow-lg: 0 18px 50px rgba(16,30,54,0.18);
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-pill: 999px;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  --ease: cubic-bezier(0.4,0,0.2,1);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-color: #0b0e14;
    --bg-accent: radial-gradient(1200px 600px at 50% -10%, rgba(0,132,255,0.16), transparent 60%);
    --surface-color: #151a23;
    --surface-2: #1b212c;
    --text-color: #e7ecf3;
    --text-muted: #a3afc0;
    --text-faint: #6c7888;
    --border-color: #2a323f;
    --border-strong: #38424f;
    --error-color: #ff6b6b;
    --action-disabled-bg: #232b36;
    --action-disabled-text: #6c7888;
    --shadow-lg: 0 20px 55px rgba(0,0,0,0.6);
  }
}
*,*::before,*::after { box-sizing: border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg-color);
  background-image: var(--bg-accent);
  background-attachment: fixed;
  color: var(--text-color);
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: var(--surface-color);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 2rem;
  max-width: 440px;
  width: 100%;
}
.brand {
  display: flex;
  align-items: center;
  gap: .6rem;
  margin-bottom: 1.25rem;
}
.brand .logo { width: 30px; height: 30px; display: block; }
.brand .name { font-weight: 700; font-size: 1.05rem; letter-spacing: .01em; }
h1 { font-size: 1.2rem; font-weight: 600; margin: 0 0 .35rem; }
.sub { color: var(--text-muted); font-size: .88rem; margin-bottom: 1.25rem; }
.ident {
  display: flex; align-items: center; gap: .75rem;
  padding: .8rem .9rem;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  background: var(--surface-2);
  margin-bottom: .55rem;
  cursor: pointer;
  transition: border-color .15s var(--ease), background .15s var(--ease);
}
.ident:hover { border-color: var(--border-strong); }
.ident:has(input:checked) { border-color: var(--brand-2); }
.ident input { accent-color: var(--brand-2); width: 1rem; height: 1rem; }
.ident .meta { flex: 1; min-width: 0; }
.ident .type {
  font-size: .68rem; text-transform: uppercase; letter-spacing: .06em;
  color: var(--text-faint); font-family: var(--font-mono);
}
.ident .id { font-size: .92rem; color: var(--text-color); word-break: break-all; }
/* Group picker: a searchable dropdown nested in its own identity row. */
.group-picker { display: block; margin-bottom: .55rem; }
.group-picker > .ident { margin-bottom: 0; }
.group-box {
  display: none;
  margin-top: .5rem;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  background: var(--surface-2);
  overflow: hidden;
}
.group-picker:has(input:checked) .group-box { display: block; }
.group-search {
  width: 100%; border: none; outline: none;
  padding: .65rem .8rem;
  background: transparent; color: var(--text-color);
  font-family: inherit; font-size: .9rem;
  border-bottom: 1px solid var(--border-color);
}
.group-search::placeholder { color: var(--text-faint); }
.group-list { max-height: 11rem; overflow-y: auto; }
.group-opt {
  display: block; width: 100%; text-align: left;
  padding: .55rem .8rem; margin: 0;
  border: none; background: transparent;
  color: var(--text-color); font-family: inherit; font-size: .9rem;
  cursor: pointer; word-break: break-all;
}
.group-opt:hover { background: var(--surface-color); }
.group-opt[aria-selected="true"] {
  background: var(--surface-color);
  box-shadow: inset 3px 0 0 var(--brand-2);
  font-weight: 600;
}
.group-empty { padding: .55rem .8rem; color: var(--text-faint); font-size: .85rem; }
.group-chosen { font-size: .92rem; color: var(--text-color); word-break: break-all; }
.group-chosen.placeholder { color: var(--text-faint); }
button {
  width: 100%; margin-top: 1rem; padding: .8rem;
  border: none; border-radius: var(--radius-md);
  background: var(--brand-gradient); color: #fff;
  font-family: inherit; font-size: .95rem; font-weight: 600;
  cursor: pointer; transition: opacity .15s var(--ease), filter .15s var(--ease);
}
button:hover:not(:disabled) { filter: brightness(1.06); }
button:disabled { background: var(--action-disabled-bg); color: var(--action-disabled-text); cursor: not-allowed; }
.err { color: var(--error-color); font-size: .85rem; margin-top: .75rem; min-height: 1rem; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" aria-hidden="true">
      <defs>
        <linearGradient id="xipher-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="25%" stop-color="#00ddff"/>
          <stop offset="75%" stop-color="#0044ff"/>
        </linearGradient>
        <mask id="xipher-keyhole">
          <rect width="20" height="20" fill="white"/>
          <circle cx="10" cy="10" r="2" fill="black"/>
        </mask>
      </defs>
      <polygon points="2,2 7,2 10,7 13,2 18,2 14,10 18,18 12,18 10,8 8,18 2,18 6,10" fill="url(#xipher-gradient)" mask="url(#xipher-keyhole)"/>
    </svg>
    <span class="name">Xipher KMS</span>
  </div>
  <h1>Choose an identity</h1>
  <p class="sub">Select the identity you want to use. A credential will be derived and returned to the requesting application.</p>
  <form id="form"></form>
  <button id="submit" disabled>Continue</button>
  <p class="err" id="err"></p>
</div>
<script>
// Per-provider claim configuration injected by the server.
// Shape: { "Provider Name": { user: "email", group: "groups", service: "sub" }, ... }
const PROVIDER_CLAIMS = window.__XKMS_PROVIDER_CLAIMS__ || {};

function readFragment() {
  const h = new URLSearchParams(location.hash.slice(1));
  const out = { token: h.get("token"), state: h.get("state"), provider: h.get("provider") };
  // Clear the fragment so the token does not linger in the address bar / history.
  history.replaceState(null, "", location.pathname);
  return out;
}

function decodeJWT(token) {
  const part = token.split(".")[1];
  const json = atob(part.replace(/-/g, "+").replace(/_/g, "/"));
  return JSON.parse(decodeURIComponent(escape(json)));
}

// identitiesFrom returns the single-valued identities (user, service) and the
// list of group names separately, using the matched provider's claim config.
function identitiesFrom(claims, providerName) {
  const cfg = PROVIDER_CLAIMS[providerName] || {};
  const singles = [];
  if (cfg.user && claims[cfg.user]) {
    singles.push({ type: "user", id: claims[cfg.user] });
  }
  if (cfg.service && claims[cfg.service]) {
    singles.push({ type: "service", id: claims[cfg.service] });
  }
  let groups = [];
  if (cfg.group && Array.isArray(claims[cfg.group])) {
    groups = claims[cfg.group].filter(g => typeof g === "string" && g.length);
  }
  return { singles, groups };
}

function endpointFor(ident) {
  switch (ident.type) {
    case "user": return "/api/v1/credential/user";
    case "service": return "/api/v1/credential/service";
    case "group": return "/api/v1/credential/group/" + encodeURIComponent(ident.id);
  }
}

const err = document.getElementById("err");
const submit = document.getElementById("submit");

(function init() {
  const { token, state, provider } = readFragment();
  if (!token) { err.textContent = "No token provided."; return; }

  let claims;
  try { claims = decodeJWT(token); }
  catch (e) { err.textContent = "Could not read token."; return; }

  const { singles, groups } = identitiesFrom(claims, provider);
  if (singles.length === 0 && groups.length === 0) {
    err.textContent = "No usable identities in token."; return;
  }

  const form = document.getElementById("form");
  // selected holds the identity that will be submitted: {type, id}.
  let selected = null;

  // Render the single-valued identities as radio rows.
  singles.forEach((ident, i) => {
    const label = document.createElement("label");
    label.className = "ident";
    label.innerHTML =
      '<input type="radio" name="ident" value="single">' +
      '<span class="meta"><span class="type">' + ident.type + '</span><br>' +
      '<span class="id"></span></span>';
    label.querySelector(".id").textContent = ident.id;
    label.querySelector("input").addEventListener("change", () => {
      selected = ident;
      submit.disabled = false;
    });
    form.appendChild(label);
  });

  // Render the groups as a single searchable picker row.
  if (groups.length) {
    const picker = document.createElement("div");
    picker.className = "group-picker";
    picker.innerHTML =
      '<label class="ident">' +
        '<input type="radio" name="ident" value="group">' +
        '<span class="meta"><span class="type">group</span><br>' +
        '<span class="group-chosen placeholder">Select a group</span></span>' +
      '</label>' +
      '<div class="group-box">' +
        '<input type="text" class="group-search" placeholder="Search groups…" autocomplete="off">' +
        '<div class="group-list" role="listbox"></div>' +
      '</div>';
    form.appendChild(picker);

    const radio = picker.querySelector('input[name="ident"]');
    const chosen = picker.querySelector(".group-chosen");
    const search = picker.querySelector(".group-search");
    const list = picker.querySelector(".group-list");
    let chosenGroup = null;

    function syncSelected() {
      if (chosenGroup) {
        selected = { type: "group", id: chosenGroup };
        submit.disabled = false;
      } else {
        // Group row picked but no group chosen yet: block submit.
        selected = null;
        submit.disabled = true;
      }
    }

    function renderList(filter) {
      const q = filter.trim().toLowerCase();
      const matches = q ? groups.filter(g => g.toLowerCase().includes(q)) : groups;
      list.innerHTML = "";
      if (!matches.length) {
        const empty = document.createElement("div");
        empty.className = "group-empty";
        empty.textContent = "No matching groups";
        list.appendChild(empty);
        return;
      }
      matches.forEach(g => {
        const opt = document.createElement("button");
        opt.type = "button";
        opt.className = "group-opt";
        opt.textContent = g;
        opt.setAttribute("role", "option");
        opt.setAttribute("aria-selected", g === chosenGroup ? "true" : "false");
        opt.addEventListener("click", () => {
          chosenGroup = g;
          chosen.textContent = g;
          chosen.classList.remove("placeholder");
          radio.checked = true;
          renderList(search.value);
          syncSelected();
        });
        list.appendChild(opt);
      });
    }

    radio.addEventListener("change", () => {
      syncSelected();
      if (radio.checked) search.focus();
    });
    search.addEventListener("input", () => renderList(search.value));
    renderList("");
  }

  // Pre-select the first single identity when present; otherwise leave the
  // group row to be chosen by the user (submit stays disabled until a group
  // is picked).
  if (singles.length) {
    const first = form.querySelector('input[name="ident"]');
    first.checked = true;
    selected = singles[0];
    submit.disabled = false;
  }

  submit.addEventListener("click", async () => {
    if (!selected) { err.textContent = "Select an identity first."; return; }
    submit.disabled = true;
    err.textContent = "";
    try {
      const url = endpointFor(selected) + (state ? "?state=" + encodeURIComponent(state) : "");
      const res = await fetch(url, {
        method: "POST",
        headers: { "Authorization": "Bearer " + token },
      });
      if (!res.ok) throw new Error("request failed: " + res.status);
      const data = await res.json();
      if (data.redirect) { location.href = data.redirect; return; }
      err.textContent = "Credential issued but no redirect was returned.";
    } catch (e) {
      err.textContent = e.message || "Request failed.";
      submit.disabled = false;
    }
  });
})();
</script>
</body>
</html>
