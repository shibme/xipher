image:
  repository: shibme/xipher
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent  # IfNotPresent | Always | Never

replicaCount: 1

# xkms configuration - rendered into /etc/xkms/config.yaml inside the container
config:
  # REQUIRED. Public base URL of this XKMS deployment (scheme + host, no trailing slash).
  # The chart derives redirect_uri for each provider by appending /callback.
  # Register "<external_url>/callback" as the redirect URI with every IdP.
  # Example: https://xkms.example.com
  external_url: ""

  # Path to the master seed file inside the container.
  # The chart mounts an in-memory emptyDir (named "xipher-run") at the parent
  # directory of this path; an init container must write the seed here before
  # startup. xkms reads, validates, loads the seed into memory, then DELETES
  # the file - so the directory must be writable (the root filesystem is read-only).
  seed_file: /var/run/xkms/seed

  # URL path prefix for the public-key (xpk) discovery endpoints. Optional;
  # defaults to /xpk/ when unset. Routing only - does not affect key derivation.
  pubkey_path: ""

  # REQUIRED. OIDC identity providers keyed by a URL-safe ID. The key is used in
  # /xpk/{id}/… paths and as part of HKDF key derivation. With a single
  # provider the sign-in selector page is skipped entirely. At least one
  # provider is required; each must set issuer_url and client_id.
  #
  # The client secret is pulled from a Kubernetes Secret via clientSecretRef;
  # the chart wires it into a per-provider env var automatically. Omit it for
  # public/PKCE clients that have no secret.
  providers: {}
  # corp-sso:
  #   name: "Corporate SSO"
  #   issuer_url: "https://accounts.example.com"   # required
  #   client_id: "xkms"                            # required
  #   clientSecretRef:
  #     name: xkms-oidc          # Kubernetes Secret name
  #     key: client_secret       # key within the Secret
  #   scopes:
  #     - openid
  #     - profile
  #     - email
  #     - groups
  #   use_pkce: false
  #   claims:
  #     user: email      # single-value claim
  #     group: groups    # array-value claim, one identity per element
  #     service: sub     # single-value claim
  # github:
  #   name: "GitHub Actions"
  #   issuer_url: "https://token.actions.githubusercontent.com"
  #   client_id: "xkms-gh"
  #   clientSecretRef:
  #     name: xkms-github
  #     key: client_secret
  #   scopes: [openid]
  #   claims:
  #     service: sub

  auth_header:
    # bearer: Authorization: Bearer <jwt>
    # custom: header name set by .auth_header.name
    type: bearer  # bearer | custom
    name: Authorization  # only used when type is "custom"

  credential:
    # What the credential endpoints return. At least one must be true.
    seed: true  # include the base64-encoded raw seed
    key: true    # include the XSK_-prefixed key
    # Session lifetime in seconds. 0 = ephemeral (credential valid for one use / until browser closes).
    timeout: 0

  # Browser sign-in selector page behavior (shown when more than one provider
  # is configured). Omit a key to use the server default.
  login:
    # Seconds the redirect overlay counts down (with a Cancel button) before
    # navigating to the IdP. 0 = redirect immediately, no countdown. Default 3.
    redirect_delay: 3
    # Offer "remember my provider on this device". A returning user then skips
    # the selector and sees a "Signing you in with <provider>…" interstitial
    # with Cancel / Choose another. Default true.
    remember: true

  # Serve quantum-safe hybrid public keys (X25519 + ML-KEM-1024) instead of ECC-only.
  post_quantum: true  # true | false

  # REQUIRED. Allowed xipher app origins for the xcb (callback) parameter.
  # Matched by scheme+host. At least one entry is required.
  xipher_urls: []
  # - https://xipher.org

service:
  type: ClusterIP  # ClusterIP | NodePort | LoadBalancer
  port: 8080
  # nodePort: 30080  # only used when type=NodePort

# Standard Kubernetes Ingress. Enable one of ingress or httpRoute, not both.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: xkms.example.com
      paths:
        - path: /
          pathType: Prefix  # Prefix | Exact | ImplementationSpecific
  tls: []
  # - secretName: xkms-tls
  #   hosts:
  #     - xkms.example.com

# Gateway API HTTPRoute. Enable one of ingress or httpRoute, not both.
httpRoute:
  enabled: false
  parentRefs:
    - name: ""
      namespace: ""
      # sectionName: https
  hostnames: []
  # - xkms.example.com
  annotations: {}

resources: {}
# limits:
#   cpu: 500m
#   memory: 256Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

# Init containers run before xkms starts - required to inject the seed file.
# Mount the chart-managed "xipher-run" volume (mounted by xkms at the parent of
# config.seed_file) and write the seed to config.seed_file (default /var/run/xkms/seed).
# Example: copy a seed from a mounted Kubernetes Secret into the shared volume.
initContainers: []
# - name: seed-injector
#   image: busybox
#   command: ["/bin/sh", "-c", "cp /seed/xkms.seed /var/run/xkms/seed"]
#   volumeMounts:
#     - name: xipher-run        # chart-managed in-memory volume shared with xkms
#       mountPath: /var/run/xkms
#     - name: seed-secret       # your own volume holding the raw seed
#       mountPath: /seed
#       readOnly: true

# Extra volumes added to the pod (e.g. the raw seed Secret consumed by the init container).
extraVolumes: []
# - name: seed-secret
#   secret:
#     secretName: xkms-seed
#     items:
#       - key: seed
#         path: xkms.seed

serviceAccount:
  create: false  # set true to create a dedicated ServiceAccount
  name: ""       # defaults to the release fullname when create=true
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532   # matches USER in the distroless image
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
