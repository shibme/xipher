apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "xkms.fullname" . }}
  labels:
    {{- include "xkms.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 8080

    seed_file: {{ .Values.config.seed_file | quote }}
    {{- with .Values.config.pubkey_path }}

    pubkey_path: {{ . | quote }}
    {{- end }}

    {{- if not .Values.config.providers }}
    {{- fail "config.providers must define at least one OIDC provider" }}
    {{- end }}
    providers:
      {{- $extURL := required "config.external_url is required" .Values.config.external_url }}
      {{- range $id, $p := .Values.config.providers }}
      {{ $id }}:
        name: {{ $p.name | quote }}
        issuer_url: {{ required (printf "config.providers.%s.issuer_url is required" $id) $p.issuer_url | quote }}
        client_id: {{ required (printf "config.providers.%s.client_id is required" $id) $p.client_id | quote }}
        client_secret:
          {{- if and $p.client_secret $p.client_secret.secretRef $p.client_secret.secretRef.name }}
          env: {{ include "xkms.providerSecretEnv" $id | quote }}
          {{- end }}
        redirect_uri: {{ printf "%s/callback" ($extURL | trimSuffix "/") | quote }}
        scopes:
          {{- toYaml $p.scopes | nindent 10 }}
        use_pkce: {{ $p.use_pkce }}
        claims:
          {{- toYaml $p.claims | nindent 10 }}
      {{- end }}

    auth_header:
      type: {{ .Values.config.auth_header.type | quote }}
      name: {{ .Values.config.auth_header.name | quote }}

    credential:
      seed: {{ .Values.config.credential.seed }}
      key: {{ .Values.config.credential.key }}
      timeout: {{ .Values.config.credential.timeout }}

    post_quantum: {{ .Values.config.post_quantum }}

    {{- if not .Values.config.xipher_urls }}
    {{- fail "config.xipher_urls must list at least one allowed origin" }}
    {{- end }}
    xipher_urls:
      {{- toYaml .Values.config.xipher_urls | nindent 6 }}
