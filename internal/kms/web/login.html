<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xipher KMS · Sign in</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" href="/favicon.ico" sizes="any">
<style>
:root {
  --brand-1: #00ddff;
  --brand-2: #0044ff;
  --brand-gradient: linear-gradient(135deg, #00ddff, #0044ff);
  --bg-color: #eef2f7;
  --bg-accent: radial-gradient(1200px 600px at 50% -10%, rgba(0,132,255,0.10), transparent 60%);
  --surface-color: #ffffff;
  --surface-2: #f5f8fc;
  --text-color: #1c2430;
  --text-muted: #5a6677;
  --text-faint: #8a96a8;
  --border-color: #d7dee8;
  --border-strong: #c2ccd9;
  --error-color: #e5484d;
  --shadow-lg: 0 18px 50px rgba(16,30,54,0.18);
  --radius-md: 12px;
  --radius-lg: 18px;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --ease: cubic-bezier(0.4,0,0.2,1);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-color: #0b0e14;
    --bg-accent: radial-gradient(1200px 600px at 50% -10%, rgba(0,132,255,0.16), transparent 60%);
    --surface-color: #151a23;
    --surface-2: #1b212c;
    --text-color: #e7ecf3;
    --text-muted: #a3afc0;
    --text-faint: #6c7888;
    --border-color: #2a323f;
    --border-strong: #38424f;
    --error-color: #ff6b6b;
    --shadow-lg: 0 20px 55px rgba(0,0,0,0.6);
  }
}
*,*::before,*::after { box-sizing: border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg-color);
  background-image: var(--bg-accent);
  background-attachment: fixed;
  color: var(--text-color);
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: var(--surface-color);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 2rem;
  max-width: 400px;
  width: 100%;
}
.brand {
  display: flex;
  align-items: center;
  gap: .6rem;
  margin-bottom: 1.25rem;
}
.brand .logo { width: 30px; height: 30px; display: block; }
.brand .name { font-weight: 700; font-size: 1.05rem; letter-spacing: .01em; }
h1 { font-size: 1.2rem; font-weight: 600; margin: 0 0 .35rem; }
.sub { color: var(--text-muted); font-size: .88rem; margin-bottom: 1.5rem; }
.providers { display: flex; flex-direction: column; gap: .6rem; }
.provider-btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; padding: .8rem 1rem;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  background: var(--surface-2);
  color: var(--text-color);
  font-family: inherit; font-size: .95rem; font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: border-color .15s var(--ease), background .15s var(--ease);
}
.provider-btn:hover {
  border-color: var(--border-strong);
  background: var(--surface-color);
}
.err { color: var(--error-color); font-size: .85rem; margin-top: 1rem; min-height: 1rem; }
.overlay {
  position: fixed; inset: 0; z-index: 100;
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 1rem;
  background: var(--bg-color);
  background-image: var(--bg-accent);
  color: var(--text-muted); font-size: .95rem;
}
.overlay.show { display: flex; }
.overlay-provider { color: var(--text-color); font-weight: 700; }
.loader {
  position: relative;
  width: 64px; height: 64px;
  display: flex; align-items: center; justify-content: center;
}
.loader-logo {
  position: absolute;
  width: 26px; height: 26px;
  animation: logo-pulse 1.5s infinite;
}
.loader-spinner {
  position: absolute;
  width: 52px; height: 52px;
  border: 3px solid var(--border-color);
  border-top-color: var(--brand-2);
  border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes logo-pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: .55; transform: scale(.92); }
}
@media (prefers-reduced-motion: reduce) {
  .loader-logo,
  .loader-spinner { animation: none; }
}
.overlay-actions { display: flex; gap: .75rem; margin-top: .25rem; }
.overlay-actions[hidden] { display: none; }
.overlay-btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: .55rem 1.1rem;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-pill, 999px);
  background: transparent; color: var(--text-muted);
  font-family: inherit; font-size: .85rem; line-height: 1; font-weight: 500; cursor: pointer;
  transition: border-color .15s var(--ease), color .15s var(--ease), filter .15s var(--ease);
}
.overlay-btn:hover { border-color: var(--border-strong); color: var(--text-color); }
.overlay-btn.primary {
  background: linear-gradient(180deg, var(--surface-color), var(--surface-2));
  border-color: var(--border-strong);
  color: var(--text-color);
}
.overlay-btn.primary:hover {
  border-color: var(--brand-2);
  color: var(--text-color);
}
.remember {
  display: flex; align-items: center; gap: .5rem;
  margin-top: 1rem; font-size: .85rem; color: var(--text-muted);
  cursor: pointer;
}
.remember input { accent-color: var(--brand-2); width: .95rem; height: .95rem; }
.cancel-link {
  display: block; width: 100%; margin-top: 1rem; padding: .6rem;
  background: transparent; border: none;
  color: var(--text-muted); font-family: inherit; font-size: .85rem;
  cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
}
.cancel-link:hover { color: var(--text-color); }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" aria-hidden="true">
      <defs>
        <linearGradient id="xipher-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="25%" stop-color="#00ddff"/>
          <stop offset="75%" stop-color="#0044ff"/>
        </linearGradient>
        <mask id="xipher-keyhole">
          <rect width="20" height="20" fill="white"/>
          <circle cx="10" cy="10" r="2" fill="black"/>
        </mask>
      </defs>
      <polygon points="2,2 7,2 10,7 13,2 18,2 14,10 18,18 12,18 10,8 8,18 2,18 6,10" fill="url(#xipher-gradient)" mask="url(#xipher-keyhole)"/>
    </svg>
    <span class="name">Xipher KMS</span>
  </div>
  <h1>Sign in</h1>
  <p class="sub">Choose an identity provider to continue.</p>
  <div class="providers" id="providers"></div>
  <label class="remember" id="remember-row" hidden>
    <input type="checkbox" id="remember"> Remember my choice on this device
  </label>
  <button type="button" class="cancel-link" id="cancel" hidden>Cancel and return to the app</button>
  <p class="err" id="err"></p>
</div>
<div class="overlay" id="overlay">
  <div class="loader" aria-hidden="true">
    <svg class="loader-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
      <defs>
        <linearGradient id="xipher-loader-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="25%" stop-color="#00ddff"/>
          <stop offset="75%" stop-color="#0044ff"/>
        </linearGradient>
        <mask id="xipher-loader-keyhole">
          <rect width="20" height="20" fill="white"/>
          <circle cx="10" cy="10" r="2" fill="black"/>
        </mask>
      </defs>
      <polygon points="2,2 7,2 10,7 13,2 18,2 14,10 18,18 12,18 10,8 8,18 2,18 6,10" fill="url(#xipher-loader-gradient)" mask="url(#xipher-loader-keyhole)"/>
    </svg>
    <div class="loader-spinner"></div>
  </div>
  <p id="overlay-text">Redirecting to your provider…</p>
  <div class="overlay-actions" id="overlay-actions" hidden>
    <button type="button" class="overlay-btn primary" id="overlay-continue">Continue</button>
    <button type="button" class="overlay-btn" id="overlay-cancel">Cancel</button>
  </div>
</div>
<script>
const PROVIDERS = window.__XKMS_PROVIDERS__ || [];
const PARAMS = window.__XKMS_PARAMS__ || "";
const LOGIN = window.__XKMS_LOGIN__ || {};

// Seconds the redirect overlay counts down before navigating to the IDP (server-
// configured via login.redirect_delay; 0 = redirect immediately). Gives the user
// time to read where they're going, continue immediately, or cancel.
const REDIRECT_DELAY_SECONDS = Number.isInteger(LOGIN.redirectDelay) ? LOGIN.redirectDelay : 3;
// Whether the "remember my provider" option is offered (login.remember).
const REMEMBER_ENABLED = LOGIN.remember !== false;
// Client-side "remember my provider" marker. Scoped to the chosen provider only
// (NOT the IDP session, which the IDP owns); lets repeat visits skip the picker.
const REMEMBER_COOKIE = "xkms_remember_provider";
const REMEMBER_MAX_AGE = 60 * 60 * 24 * 90; // 90 days

function readRemembered() {
  const m = document.cookie.match(/(?:^|;\s*)xkms_remember_provider=([^;]*)/);
  return m ? decodeURIComponent(m[1]) : "";
}
function setRemembered(name) {
  document.cookie = REMEMBER_COOKIE + "=" + encodeURIComponent(name) +
    ";path=/;max-age=" + REMEMBER_MAX_AGE + ";SameSite=Lax";
}
function clearRemembered() {
  document.cookie = REMEMBER_COOKIE + "=;path=/;max-age=0;SameSite=Lax";
}

function providerHref(name) {
  return "/login?" + PARAMS + "&provider=" + encodeURIComponent(name);
}

(function init() {
  const err = document.getElementById("err");
  const container = document.getElementById("providers");
  const rememberRow = document.getElementById("remember-row");
  const rememberBox = document.getElementById("remember");
  const overlay = document.getElementById("overlay");
  const overlayText = document.getElementById("overlay-text");
  const overlayActions = document.getElementById("overlay-actions");
  const continueBtn = document.getElementById("overlay-continue");
  const cancelBtn = document.getElementById("overlay-cancel");
  const abortBtn = document.getElementById("cancel");

  // Cancel the whole flow: bounce back to the (server-validated) xipher app
  // with a "denied" signal. No provider chosen yet and no state created, so the
  // server rebuilds the callback from the xpk/xcb query it already validated.
  abortBtn.addEventListener("click", function() {
    overlayText.textContent = "Returning you to the app…";
    overlay.classList.add("show");
    window.location.href = "/login?" + PARAMS + "&cancel=1";
  });

  if (!PROVIDERS.length) {
    err.textContent = "No identity providers configured.";
    return;
  }

  let countdownTimer = null;

  function stopCountdown() {
    if (countdownTimer !== null) {
      clearInterval(countdownTimer);
      countdownTimer = null;
    }
  }

  function navigate(name, remember) {
    if (remember) setRemembered(name);
    window.location.href = providerHref(name);
  }

  // beginRedirect shows the redirect overlay, then navigates to the chosen
  // provider. With REDIRECT_DELAY_SECONDS > 0 it runs a countdown with Continue
  // and Cancel actions; with 0 it navigates immediately (overlay still flashes
  // as a loader).
  // onCancel lets the caller decide what cancelling means.
  function beginRedirect(name, opts) {
    opts = opts || {};
    const prefix = opts.prefix || "Redirecting to";
    const providerName = opts.provider || name;
    overlay.classList.add("show");

    const render = function(remaining) {
      overlayText.textContent = "";
      if (prefix && providerName) {
        overlayText.append(document.createTextNode(prefix + " "));
        const provider = document.createElement("strong");
        provider.className = "overlay-provider";
        provider.textContent = providerName;
        overlayText.append(provider);
        if (remaining) overlayText.append(document.createTextNode(" (" + remaining + ")"));
        return;
      }
      overlayText.textContent = "Redirecting…" + (remaining ? " (" + remaining + ")" : "");
    };

    if (REDIRECT_DELAY_SECONDS <= 0) {
      // No countdown: no cancel affordance, go now.
      render(0);
      overlayActions.hidden = true;
      navigate(name, opts.remember);
      return;
    }

    overlayActions.hidden = false;

    let remaining = REDIRECT_DELAY_SECONDS;
    render(remaining);

    continueBtn.onclick = function() {
      stopCountdown();
      render(0);
      overlayActions.hidden = true;
      navigate(name, opts.remember);
    };
    cancelBtn.onclick = function() {
      stopCountdown();
      overlay.classList.remove("show");
      overlayActions.hidden = true;
      if (typeof opts.onCancel === "function") opts.onCancel();
    };

    countdownTimer = setInterval(function() {
      remaining -= 1;
      if (remaining > 0) { render(remaining); return; }
      stopCountdown();
      render(0);
      overlayActions.hidden = true;
      navigate(name, opts.remember);
    }, 1000);
  }

  // Render the provider list. Each row starts the (possibly delayed) redirect;
  // the "remember" checkbox (when enabled + ticked) persists the choice.
  function renderPicker() {
    rememberRow.hidden = !REMEMBER_ENABLED;
    abortBtn.hidden = false;
    PROVIDERS.forEach(function(p) {
      const a = document.createElement("a");
      a.className = "provider-btn";
      a.textContent = p.name;
      a.href = providerHref(p.name);
      a.addEventListener("click", function(e) {
        e.preventDefault();
        beginRedirect(p.name, {
          remember: REMEMBER_ENABLED && rememberBox.checked,
          onCancel: function() { /* stay on the picker */ },
        });
      });
      container.appendChild(a);
    });
  }

  // If remembering is enabled and a remembered provider is still configured,
  // skip the picker and show an interstitial that auto-continues but offers an
  // escape hatch.
  const remembered = REMEMBER_ENABLED ? readRemembered() : "";
  const known = remembered && PROVIDERS.some(function(p) { return p.name === remembered; });
  if (known) {
    beginRedirect(remembered, {
      label: "Signing you in with " + remembered,
      prefix: "Signing you in with",
      provider: remembered,
      remember: true, // refresh the cookie's lifetime on use
      // Cancel: clear the remembered choice, show the picker.
      onCancel: function() { clearRemembered(); renderPicker(); },
    });
    return;
  }

  // Stale remembered name (provider removed), or remembering disabled with a
  // lingering cookie: drop it silently.
  if (remembered && !known) {
    clearRemembered();
  }
  renderPicker();
})();
</script>
</body>
</html>
