# XKMS - Xipher Key Management Service · example configuration

server:
  host: 0.0.0.0
  port: 8080

# Master seed file: read once at startup, validated (>= 64 bytes, high entropy),
# loaded into memory, then DELETED from the filesystem. Raw, hex, or base64.
seed_file: /run/secrets/xkms.seed

# URL path prefix for the public-key (xpk) discovery endpoints. Optional.
# Defaults to /xpk/ when unset. Normalized to leading + trailing slash.
# Routing only - does not affect key derivation.
pubkey_path: /xpk/

# OIDC identity providers keyed by a URL-safe ID (used in /xpk/{id}/… paths
# and as part of HKDF key derivation). Each provider has its own claim mapping
# - omit a claim field to disable that entity type for that provider.
# With a single provider the sign-in selector page is skipped entirely.
providers:
  corp-sso:
    name: "Corporate SSO"
    issuer_url: "https://sso.example.com"
    client_id: "xkms"
    # client_secret is read from an env var OR a file. A file is cleared after read.
    client_secret:
      env: XKMS_OIDC_CLIENT_SECRET
      # file: /run/secrets/oidc_secret
    redirect_uri: "https://xkms.example.com/callback"
    scopes:
      - openid
      - profile
      - email
      - groups
    # use_pkce: true
    claims:
      user: email      # single value
      group: groups    # array value -> one identity per group member
      service: sub     # single value

  github:
    name: "GitHub Actions"
    issuer_url: "https://token.actions.githubusercontent.com"
    client_id: "xkms-gh"
    client_secret:
      env: XKMS_GITHUB_SECRET
    redirect_uri: "https://xkms.example.com/callback"
    scopes:
      - openid
    claims:
      service: sub   # only service identity from GitHub tokens

# Header carrying the OIDC JWT for direct API auth. Shared across all providers.
auth_header:
  type: bearer          # "bearer" (Authorization: Bearer <jwt>) | "custom"
  name: Authorization   # used only when type is "custom"

# What the credential endpoints return. At least one of seed/key must be true.
credential:
  seed: true            # include the base64-encoded raw seed
  key: true             # include the XSK_-prefixed key
  timeout: 604800       # seconds; 0 = ephemeral

# Browser sign-in page behavior (the provider selector shown when more than one
# provider is configured).
login:
  # Seconds the redirect overlay counts down (with a Cancel button) before
  # navigating to the IdP. 0 = redirect immediately, no countdown. Default 3.
  redirect_delay: 3
  # Offer a "remember my provider on this device" option. When set, a returning
  # user skips the selector and sees a "Signing you in with <provider>…"
  # interstitial with Cancel / Choose another. Default true.
  remember: true

# Public key kind served by the public /xpk/<provider>/<type>/<id>/.well-known/xipher
# endpoints: quantum-safe hybrid (X25519 + ML-KEM-1024) when true, else ECC.
post_quantum: false

# List of xipher app callback origins (the xcb param). Matched by scheme+host.
xipher_urls:
  - https://xipher.org
  - https://xipher.int.example.com
