apiVersion: v1
kind: Service
metadata:
  name: {{ include "xkms.fullname" . }}
  labels:
    {{- include "xkms.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
      name: https
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "xkms.selectorLabels" . | nindent 4 }}
